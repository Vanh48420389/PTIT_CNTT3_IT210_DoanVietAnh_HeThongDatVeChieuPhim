# ===============================
# 1. SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# 2. DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/cinema_booking_system?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# 3. JPA / HIBERNATE CONFIGURATION
# ===============================
# In ra các câu l?nh SQL ?? d? debug quá tŕnh truy v?n
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 'update' giúp t? ??ng t?o/c?p nh?t b?ng trong Database d?a trên các class Entity.
# R?t ti?n trong giai ?o?n ??u phát tri?n.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# 4. VIEW TEMPLATE CONFIGURATION
# ===============================
# C?u h́nh n?u s? d?ng Thymeleaf cho Front-end
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ===============================
# 5. UPLOAD FILE (Dùng cho ch?c n?ng t?i poster phim)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

