<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Đặt Vé - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body {
            background-color: #050505;
            color: #eaeaea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* THIẾT KẾ VÉ (TICKET) NEON */
        .ticket-neon {
            background-color: #111;
            border: 1px solid #222;
            border-left: 6px solid #e50914; /* Vạch đỏ CGV đặc trưng */
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex;
        }

        /* Hiệu ứng vé sáng lên khi hover */
        .ticket-neon:hover {
            transform: translateY(-5px);
            border-color: #e50914;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4), inset 0 0 10px rgba(229, 9, 20, 0.1);
        }

        .poster-mini {
            width: 130px;
            height: 100%;
            object-fit: cover;
            border-right: 1px solid #222;
        }

        /* Vạch đứt phân cách trên vé */
        .ticket-divider {
            border-left: 2px dashed #333;
            margin: 0 15px;
        }

        /* Custom Nút Hủy Neon */
        .btn-neon-danger {
            background-color: transparent;
            color: #e50914;
            border: 1px solid #e50914;
            transition: 0.3s;
            border-radius: 6px;
        }
        .btn-neon-danger:hover {
            background-color: #e50914;
            color: white;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.7);
        }

        /* Custom Badge Neon */
        .badge-neon-success {
            border: 1px solid #198754;
            color: #20c997;
            background: rgba(25, 135, 84, 0.1);
            text-shadow: 0 0 5px rgba(32, 201, 151, 0.5);
        }

        .glow-text-gold {
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
    </style>
</head>
<body>
<div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-5 border-bottom border-secondary pb-3">
        <h2 class="fw-bold text-warning m-0 glow-text-gold">
            <i class="bi bi-ticket-detailed-fill me-2"></i>LỊCH SỬ ĐẶT VÉ
        </h2>
        <a th:href="@{/}" class="btn btn-outline-light fw-bold transition-all">
            <i class="bi bi-house-door me-1"></i> Quay lại trang chủ
        </a>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger border-danger border-2 text-danger bg-black fw-bold text-center" th:text="${errorMsg}"></div>
    <div th:if="${successMsg}" class="alert alert-success border-success border-2 text-success bg-black fw-bold text-center" th:text="${successMsg}"></div>

    <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
        <i class="bi bi-inbox text-secondary" style="font-size: 5rem; opacity: 0.5;"></i>
        <h3 class="text-muted fw-bold mt-3">Bạn chưa có giao dịch nào!</h3>
        <p class="text-secondary">Hãy chọn cho mình một bộ phim yêu thích nhé.</p>
        <a th:href="@{/}" class="btn btn-danger mt-3 fw-bold px-4 py-2" style="box-shadow: 0 0 15px rgba(229,9,20,0.5);">
            <i class="bi bi-film me-1"></i> MUA VÉ NGAY
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div th:each="b : ${bookings}" class="ticket-neon"
                 th:style="${b.status == 'CANCELLED'} ? 'opacity: 0.5; border-left-color: #444; filter: grayscale(50%);' : ''">

                <img th:src="${b.showtime.movie.posterUrl}" class="poster-mini" alt="Poster">

                <div class="p-4 flex-grow-1">
                    <h4 class="fw-bold text-uppercase mb-3"
                        th:classappend="${b.status == 'CANCELLED'} ? 'text-secondary' : 'text-info'"
                        th:text="${b.showtime.movie.title}">Tên Phim</h4>

                    <div class="row text-light opacity-75 fs-6">
                        <div class="col-md-6 mb-2">
                            <i class="bi bi-door-open text-warning me-1"></i> Phòng: <strong class="text-white" th:text="${b.showtime.room.name}"></strong>
                        </div>
                        <div class="col-md-6 mb-2">
                            <i class="bi bi-layout-three-columns text-warning me-1"></i> Ghế: <strong class="text-warning fs-5 glow-text-gold" th:text="${b.seat.name}"></strong>
                            <span class="small">(<span th:text="${b.seat.type}"></span>)</span>
                        </div>
                        <div class="col-md-12 mt-2">
                            <i class="bi bi-clock-history text-warning me-1"></i> Suất chiếu: <strong class="text-white" th:text="${#temporals.format(b.showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></strong>
                        </div>
                    </div>
                </div>

                <div class="ticket-divider"></div>

                <div class="p-4 d-flex flex-column justify-content-center align-items-end" style="min-width: 240px; background-color: #0a0a0a;">
                    <div class="text-secondary small mb-1">Tổng thanh toán</div>

                    <h3 class="fw-bold m-0 mb-3"
                        th:classappend="${b.status == 'CANCELLED'} ? 'text-secondary' : 'text-success'"
                        th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></h3>

                    <span th:if="${b.status == 'CANCELLED'}" class="badge border border-secondary text-secondary bg-transparent p-2 mb-2 fs-6 w-100 text-center">
                        <i class="bi bi-x-circle me-1"></i> ĐÃ HỦY VÉ
                    </span>

                    <div th:if="${b.status == 'PAID'}" class="w-100 text-end">
                        <span class="badge badge-neon-success p-2 mb-3 w-100 text-center fs-6">
                            <i class="bi bi-check-circle me-1"></i> Đã thanh toán
                        </span>

                        <form th:id="'cancelForm-' + ${b.id}" th:action="@{/booking/cancel/{id}(id=${b.id})}" method="post">
                            <button type="button" class="btn btn-neon-danger btn-sm fw-bold w-100 py-2"
                                    th:onclick="'confirmCancel(' + ${b.id} + ')'">
                                <i class="bi bi-x-lg me-1"></i> Hủy vé (Hoàn tiền)
                            </button>
                        </form>
                    </div>

                    <div class="small text-secondary mt-3 text-end" style="font-size: 0.8rem;">
                        <i class="bi bi-info-circle me-1"></i> Đặt lúc: <br>
                        <span th:text="${b.bookingDate != null ? #temporals.format(b.bookingDate, 'HH:mm dd/MM/yyyy') : 'Dữ liệu cũ'}"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    function confirmCancel(bookingId) {
        Swal.fire({
            title: 'Xác nhận hủy vé?',
            text: "Chỉ được hủy trước giờ chiếu 24 tiếng. Tiền sẽ được hoàn vào ví của bạn sau 2-3 ngày làm việc.",
            icon: 'warning',
            // DARK MODE CHO SWEETALERT
            background: '#1a1a1a',
            color: '#fff',
            iconColor: '#ffc107',
            showCancelButton: true,
            confirmButtonColor: '#e50914',
            cancelButtonColor: '#444',
            confirmButtonText: '<i class="bi bi-check-lg"></i> Đồng ý Hủy',
            cancelButtonText: 'Bỏ qua',
            customClass: {
                popup: 'border border-secondary rounded-4'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('cancelForm-' + bookingId).submit();
            }
        })
    }
</script>
</body>
</html>
