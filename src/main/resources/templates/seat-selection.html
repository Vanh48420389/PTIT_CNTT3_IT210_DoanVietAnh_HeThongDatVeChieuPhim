<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chọn Ghế - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body {
            background-color: #050505;
            color: #eaeaea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-bottom: 80px;
        }

        /* MÀN HÌNH CONG NEON GLOW */
        .screen {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            height: 10px;
            width: 70%;
            margin: 0 auto 60px auto;
            border-radius: 50% / 100% 100% 0 0;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
            position: relative;
        }
        .screen::after {
            content: 'MÀN HÌNH CHÍNH';
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            letter-spacing: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* LƯỚI GHẾ NGỒI VUÔNG VẮN */
        .seat-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 12px;
            justify-content: center;
            max-width: 550px;
            margin: 0 auto;
        }

        .seat {
            background-color: #1a1a1a;
            height: 40px;
            width: 45px;
            border: 1px solid #333;
            border-radius: 4px; /* ÉP VUÔNG VẮN */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            color: #888;
        }

        /* Ghế VIP có viền vàng */
        .seat[data-seat-type="VIP"] {
            border-color: rgba(255, 193, 7, 0.3);
        }

        .seat:not(.booked):hover {
            border-color: #e50914;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }

        /* Ghế Đang Chọn (Neon Gold) */
        .seat.selected {
            background-color: #ffc107 !important;
            border-color: #ffc107 !important;
            color: #000 !important;
            box-shadow: 0 0 20px rgba(255, 193, 7, 0.6);
            transform: scale(1.1);
        }

        /* Ghế Đã Bán (Dark Gray) */
        .seat.booked {
            background-color: #0a0a0a !important;
            border-color: #111 !important;
            color: transparent !important; /* Ẩn số ghế đã bán */
            cursor: not-allowed;
            position: relative;
        }
        .seat.booked::after {
            content: 'X';
            color: #333;
            position: absolute;
            font-size: 1rem;
        }

        /* CHÚ THÍCH */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 50px;
            padding: 20px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
        }
        .legend div { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #adb5bd; }

        /* THẺ THANH TOÁN KÍNH MỜ */
        .checkout-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #222;
            border-radius: 4px; /* VUÔNG VẮN */
            padding: 30px;
            position: sticky;
            top: 100px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glow-text-gold { text-shadow: 0 0 10px rgba(255, 193, 7, 0.5); }
    </style>
</head>
<body>

<div class="container py-5">
    <a th:href="@{/booking/movie/{id}/showtimes(id=${showtime.movie.id})}" class="btn btn-outline-light mb-5 px-4" style="border-radius: 4px;">
        <i class="bi bi-arrow-left me-2"></i> Trở về
    </a>

    <div class="row">
        <div class="col-lg-8 text-center px-md-5">

            <h2 class="fw-bold mb-2 text-warning text-uppercase glow-text-gold" th:text="${showtime.movie.title}">Tên Phim</h2>
            <p class="text-secondary fs-6 mb-5">
                <i class="bi bi-door-open text-info me-1"></i> Phòng: <strong class="text-white" th:text="${showtime.room.name}"></strong>
                &nbsp; | &nbsp;
                <i class="bi bi-clock text-info me-1"></i> Giờ chiếu: <strong class="text-white" th:text="${#temporals.format(showtime.startTime, 'HH:mm - dd/MM/yyyy')}"></strong>
            </p>

            <div class="screen"></div>

            <div class="seat-container">
                <div th:each="seat : ${allSeats}"
                     class="seat"
                     th:classappend="${bookedSeatIds.contains(seat.id)} ? 'booked' : ''"
                     th:text="${seat.name}"
                     th:data-seat-id="${seat.id}"
                     th:data-seat-type="${seat.type}"
                     onclick="selectSeat(this)">
                </div>
            </div>

            <div class="legend border border-secondary border-opacity-10">
                <div><div class="seat" style="width: 20px; height: 20px; border-color: #333;"></div> Ghế Thường</div>
                <div><div class="seat" style="width: 20px; height: 20px; border-color: rgba(255, 193, 7, 0.5);"></div> Ghế VIP</div>
                <div><div class="seat selected" style="width: 20px; height: 20px;"></div> Đang Chọn</div>
                <div><div class="seat booked" style="width: 20px; height: 20px;"></div> Đã Bán</div>
            </div>
        </div>

        <div class="col-lg-4 mt-5 mt-lg-0">
            <div class="checkout-card">
                <h4 class="text-warning fw-bold border-bottom border-secondary pb-3 text-center glow-text-gold">
                    <i class="bi bi-ticket-perforated me-2"></i>THÔNG TIN VÉ
                </h4>

                <div class="mt-4 fs-5">
                    <div class="d-flex justify-content-between mb-3 align-items-center">
                        <span class="text-secondary small fw-bold">GHẾ ĐANG CHỌN:</span>
                        <strong id="selectedSeatName" class="text-danger fs-3" style="text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);">-</strong>
                    </div>

                    <div class="d-flex justify-content-between mb-3 border-bottom border-secondary border-opacity-50 pb-3 align-items-center">
                        <span class="text-secondary small fw-bold">GIÁ VÉ:</span>
                        <strong class="text-info fs-5" id="ticketPrice">0 VNĐ</strong>
                    </div>

                    <div class="d-flex justify-content-between pt-2 align-items-center">
                        <span class="text-white fw-bold">TỔNG TIỀN:</span>
                        <strong class="text-warning fs-3 glow-text-gold" id="totalPrice">0 VNĐ</strong>
                    </div>
                </div>

                <form id="checkoutForm" th:action="@{/booking/{id}/checkout(id=${showtime.id})}" method="post">
                    <input type="hidden" id="seatIdInput" name="seatId" required>
                    <button type="button" class="btn btn-danger w-100 fw-bold fs-5 mt-5 py-3"
                            id="btnCheckout" disabled onclick="confirmCheckout()"
                            style="border-radius: 4px; letter-spacing: 1px; box-shadow: 0 0 20px rgba(229, 9, 20, 0.2);">
                        THANH TOÁN NGAY
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function selectSeat(element) {
        if (element.classList.contains('booked')) return;

        document.querySelectorAll('.seat').forEach(s => s.classList.remove('selected'));
        element.classList.add('selected');

        document.getElementById('selectedSeatName').innerText = element.innerText;
        document.getElementById('seatIdInput').value = element.getAttribute('data-seat-id');

        let seatType = element.getAttribute('data-seat-type');
        let price = (seatType === 'VIP') ? 120000 : 85000;
        let formattedPrice = price.toLocaleString('vi-VN') + " VNĐ";

        document.getElementById('ticketPrice').innerText = formattedPrice;
        document.getElementById('totalPrice').innerText = formattedPrice;
        document.getElementById('btnCheckout').disabled = false;
    }

    function confirmCheckout() {
        let seatName = document.getElementById('selectedSeatName').innerText;
        let price = document.getElementById('totalPrice').innerText;

        Swal.fire({
            title: 'Xác nhận thanh toán?',
            html: `Ghế chọn: <b style="color: #ffc107;">${seatName}</b><br>Tổng cộng: <b style="color: #20c997;">${price}</b>`,
            icon: 'question',
            background: '#1a1a1a',
            color: '#fff',
            showCancelButton: true,
            confirmButtonColor: '#e50914',
            cancelButtonColor: '#444',
            confirmButtonText: '<i class="bi bi-credit-card me-2"></i>Xác nhận',
            cancelButtonText: 'Hủy'
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    title: 'Đang kết nối cổng thanh toán...',
                    background: '#1a1a1a',
                    color: '#fff',
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });
                setTimeout(() => { document.getElementById('checkoutForm').submit(); }, 1500);
            }
        });
    }
</script>

</body>
</html>
