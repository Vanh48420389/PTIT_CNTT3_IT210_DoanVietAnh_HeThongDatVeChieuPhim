<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body {
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(10, 10, 10, 0.95)),
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        /* Khung Đăng nhập vuông vắn, góc cạnh */
        .glass-card {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 9, 20, 0.3); /* Viền đỏ tối mờ */
            border-radius: 4px; /* ÉP VUÔNG VẮN */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(229, 9, 20, 0.1);
            width: 420px;
            overflow: hidden;
        }

        .card-header {
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #e50914; /* Vạch đỏ CGV */
            padding: 25px 0;
        }

        /* Ô nhập liệu vuông vắn */
        .form-control {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            border-radius: 4px; /* ÉP VUÔNG VẮN */
            padding: 14px 15px;
            transition: all 0.3s;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .form-control:focus {
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4) !important;
            border-color: #e50914 !important;
            background: rgba(0, 0, 0, 0.6) !important;
            outline: none;
        }

        /* Nút bấm vuông vắn, mạnh mẽ */
        .btn-cinema {
            background: #e50914;
            border: none;
            color: white;
            border-radius: 4px; /* ÉP VUÔNG VẮN */
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-cinema:hover {
            background: #ff1e27;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.6);
            color: white;
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="card-header text-center">
        <h4 class="mb-0 fw-bold text-uppercase d-flex justify-content-center align-items-center gap-2" style="letter-spacing: 2px;">
            <i class="bi bi-film text-warning" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
            SMART CINEMA
        </h4>
    </div>
    <div class="card-body p-4 p-md-5">

        <form th:action="@{/login}" method="post">

            <div th:if="${param.registered}" class="alert alert-success text-center fw-bold rounded-1" style="background: rgba(40, 167, 69, 0.1); border-color: #28a745; color: #2de35f;">
                <i class="bi bi-check-circle me-1"></i> Đăng ký thành công! Mời bạn đăng nhập.
            </div>

            <div th:if="${error}" class="alert alert-danger text-center fw-bold rounded-1" style="background: rgba(229, 9, 20, 0.1); border-color: #e50914; color: #ff4d4d;" th:text="${error}"></div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-light" style="letter-spacing: 0.5px;">
                    <i class="bi bi-envelope-fill text-warning me-1"></i> EMAIL
                </label>
                <input type="text" name="email" class="form-control" placeholder="Nhập địa chỉ email...">
            </div>

            <div class="mb-5">
                <label class="form-label fw-bold small text-light" style="letter-spacing: 0.5px;">
                    <i class="bi bi-lock-fill text-warning me-1"></i> MẬT KHẨU
                </label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu...">
            </div>

            <button type="submit" class="btn btn-cinema btn-lg w-100 fw-bold text-uppercase fs-6 py-3">
                <i class="bi bi-box-arrow-in-right me-2"></i> ĐĂNG NHẬP
            </button>

            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-50 small">
                <span class="text-light opacity-75">Chưa có tài khoản?</span>
                <a href="/register" class="text-warning fw-bold text-decoration-none ms-1 transition-all hover-text-white" style="letter-spacing: 0.5px;">ĐĂNG KÝ NGAY</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
