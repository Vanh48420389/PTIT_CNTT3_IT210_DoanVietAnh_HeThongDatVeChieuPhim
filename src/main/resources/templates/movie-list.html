<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style th:replace="~{admin-fragments :: admin-css}"></style>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body, .main-content {
            background-color: #050505 !important;
            color: #eaeaea;
        }

        .neon-card {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 12px !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* CUSTOM BẢNG (TABLE) DARK MODE */
        .table {
            color: #eaeaea;
            border-color: #333 !important;
        }
        .table > :not(caption) > * > * {
            background-color: transparent !important;
            border-bottom-color: #333 !important;
            color: #eaeaea;
        }
        .table-dark th {
            background-color: #1a1a1a !important;
            color: #ffc107 !important;
            border-bottom: 2px solid #e50914 !important;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Hiệu ứng hover từng dòng -> Sáng đỏ mờ */
        .table-hover > tbody > tr:hover > td {
            background-color: rgba(229, 9, 20, 0.1) !important;
            color: #fff !important;
        }

        /* Custom Nút Thêm Mới */
        .btn-neon-add {
            background-color: #e50914;
            color: white;
            border: none;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
            border-radius: 6px;
        }
        .btn-neon-add:hover {
            background-color: #ff1e27;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.7);
            color: white;
        }

        /* Custom Nút Hành Động (Sửa / Xóa) */
        .btn-neon-edit {
            border: 1px solid #ffc107;
            color: #ffc107;
            background: transparent;
            transition: 0.3s;
        }
        .btn-neon-edit:hover {
            background: #ffc107;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 193, 7, 0.6);
        }

        .btn-neon-delete {
            border: 1px solid #e50914;
            color: #e50914;
            background: transparent;
            transition: 0.3s;
        }
        .btn-neon-delete:hover {
            background: #e50914;
            color: #fff;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
        }

        /* Custom Badge (Tem Trạng thái) */
        .badge-neon-success { border: 1px solid #198754; color: #20c997; background: rgba(25, 135, 84, 0.1); text-shadow: 0 0 5px rgba(32,201,151,0.3); }
        .badge-neon-warning { border: 1px solid #ffc107; color: #ffc107; background: rgba(255, 193, 7, 0.1); }
        .badge-neon-danger { border: 1px solid #dc3545; color: #ff4d4d; background: rgba(220, 53, 69, 0.1); }

        /* Poster Mini */
        .poster-thumbnail {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div th:replace="~{admin-fragments :: sidebar(activeMenu='movies')}"></div>

<div class="main-content">
    <div th:replace="~{admin-fragments :: topbar(pageTitle='🎞 QUẢN LÝ DANH MỤC PHIM')}"></div>

    <div class="content-body p-4">
        <div class="card neon-card">
            <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-collection-play text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                    <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">DANH SÁCH PHIM HIỆN TẠI</h5>
                </div>
                <a href="/admin/movies/add" class="btn btn-neon-add fw-bold px-4">
                    <i class="bi bi-plus-circle me-1"></i> THÊM PHIM MỚI
                </a>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th><i class="bi bi-image"></i> Ảnh</th>
                            <th><i class="bi bi-film"></i> Tên Phim</th>
                            <th><i class="bi bi-stopwatch"></i> Thời Lượng</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m : ${movies}">
                            <td class="py-2">
                                <img th:src="${m.posterUrl != null and m.posterUrl != '' ? m.posterUrl : 'https://via.placeholder.com/50x70?text=No+Img'}" class="poster-thumbnail">
                            </td>
                            <td class="fw-bold text-white text-start px-4" style="max-width: 200px;" th:text="${m.title}"></td>
                            <td class="text-secondary fw-bold" th:text="${m.duration} + ' phút'"></td>

                            <td>
                                <span th:if="${m.status == 1}" class="badge badge-neon-success px-3 py-2"><i class="bi bi-play-circle me-1"></i> Đang Chiếu</span>
                                <span th:if="${m.status == 0}" class="badge badge-neon-warning px-3 py-2"><i class="bi bi-clock-history me-1"></i> Sắp Chiếu</span>
                                <span th:if="${m.status == -1}" class="badge badge-neon-danger px-3 py-2"><i class="bi bi-stop-circle me-1"></i> Ngừng Chiếu</span>
                            </td>

                            <td>
                                <a th:href="@{/admin/movies/edit/{id}(id=${m.id})}" class="btn btn-sm btn-neon-edit fw-bold px-3 me-2">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <a href="#" th:onclick="'confirmDelete(event, \'/admin/movies/delete/' + ${m.id} + '\')'" class="btn btn-sm btn-neon-delete fw-bold px-3">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(movies)}">
                            <td colspan="5" class="text-center py-5 text-muted fw-bold">
                                <i class="bi bi-film fs-1 d-block mb-2 opacity-50"></i>
                                Kho phim đang trống. Hãy thêm phim mới!
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Hàm gọi SweetAlert2 Dark Mode để xác nhận xóa
    function confirmDelete(event, deleteUrl) {
        event.preventDefault(); // Ngăn trình duyệt chuyển trang ngay lập tức

        Swal.fire({
            title: 'Xóa phim này?',
            text: "Cảnh báo: Hành động này sẽ xóa vĩnh viễn phim khỏi hệ thống!",
            icon: 'warning',
            background: '#1a1a1a',
            color: '#fff',
            iconColor: '#e50914',
            showCancelButton: true,
            confirmButtonColor: '#e50914',
            cancelButtonColor: '#444',
            confirmButtonText: '<i class="bi bi-trash-fill"></i> Xác nhận Xóa',
            cancelButtonText: 'Bỏ qua',
            customClass: {
                popup: 'border border-secondary rounded-4'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                // Nếu Admin bấm OK -> Chuyển hướng đến URL xóa
                window.location.href = deleteUrl;
            }
        });
    }
</script>

</body>
</html>
