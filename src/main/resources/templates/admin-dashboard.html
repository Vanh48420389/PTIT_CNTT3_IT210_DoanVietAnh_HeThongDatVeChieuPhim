<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tổng Quan Hệ Thống - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style th:replace="~{admin-fragments :: admin-css}"></style>
    <style>
        /* ==========================================
           PHONG CÁCH NEON GLOW CINEMATIC (ĐỘC QUYỀN)
           ========================================== */
        body, .main-content {
            background-color: #050505 !important; /* Đen sâu thẳm */
            color: #eaeaea;
        }

        /* Hiệu ứng viền sáng (Glow) cho các thẻ */
        .neon-card {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 12px !important;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Hiệu ứng Hover - Sáng bừng lên */
        .neon-card:hover {
            transform: translateY(-5px);
            border-color: #e50914 !important;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4), inset 0 0 10px rgba(229, 9, 20, 0.1) !important;
        }

        /* MA THUẬT: Biến icon thường thành đèn Neon */
        .glow-icon-gold {
            color: #ffc107;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.7), 0 0 20px rgba(255, 193, 7, 0.5);
        }
        .glow-icon-red {
            color: #e50914;
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.8), 0 0 20px rgba(229, 9, 20, 0.6);
        }

        /* Chỉnh số liệu bự và sang hơn */
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .chart-container {
            background-color: #0a0a0a !important;
            border: 1px solid #222 !important;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div th:replace="~{admin-fragments :: sidebar(activeMenu='dashboard')}"></div>

<div class="main-content">
    <div th:replace="~{admin-fragments :: topbar(pageTitle='📊 TỔNG QUAN HỆ THỐNG')}"></div>

    <div class="content-body p-4">

        <div class="row g-4 mb-5">
            <div class="col-md-3">
                <div class="card neon-card h-100 p-3">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-secondary fw-bold mb-2" style="letter-spacing: 1px;">Tổng Phim</h6>
                            <div class="stat-number text-white" th:text="${totalMovies}">0</div>
                        </div>
                        <i class="bi bi-camera-reels glow-icon-gold"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card neon-card h-100 p-3">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-secondary fw-bold mb-2" style="letter-spacing: 1px;">Phòng Chiếu</h6>
                            <div class="stat-number text-white" th:text="${totalRooms}">0</div>
                        </div>
                        <i class="bi bi-projector glow-icon-red"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card neon-card h-100 p-3">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-secondary fw-bold mb-2" style="letter-spacing: 1px;">Vé Đã Bán</h6>
                            <div class="stat-number text-white" th:text="${totalTickets}">0</div>
                        </div>
                        <i class="bi bi-ticket-detailed glow-icon-gold"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card neon-card h-100 p-3" style="border-color: rgba(229, 9, 20, 0.4) !important;">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="text-uppercase text-danger fw-bold mb-2" style="letter-spacing: 1px;">Doanh Thu</h6>
                            <div class="stat-number text-warning" th:text="${#numbers.formatDecimal(totalRevenue, 0, 'COMMA', 0, 'POINT')}">0</div>
                        </div>
                        <i class="bi bi-safe glow-icon-red"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="chart-container shadow-lg p-4">
            <div class="d-flex align-items-center mb-4">
                <i class="bi bi-bar-chart-fill glow-icon-red me-3" style="font-size: 1.8rem;"></i>
                <h4 class="fw-bold text-white m-0" style="letter-spacing: 1px;">BIỂU ĐỒ DOANH THU THEO PHIM</h4>
            </div>

            <div class="card-body pb-2">
                <div th:if="${totalRevenue == 0}" class="text-center py-5">
                    <i class="bi bi-exclamation-triangle glow-icon-gold fs-1 d-block mb-3"></i>
                    <h5 class="text-danger fw-bold">Chưa có dữ liệu doanh thu!</h5>
                    <p class="text-secondary">Hệ thống chưa ghi nhận vé đã thanh toán nào.</p>
                </div>

                <div th:if="${totalRevenue > 0}" style="position: relative; height:420px; width:100%">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    var movieLabels = /*[[${movieNames}]]*/ [];
    var revenueData = /*[[${revenues}]]*/ [];

    if (document.getElementById('revenueChart')) {
        var ctx = document.getElementById('revenueChart').getContext('2d');

        // Cấu hình UI cho Chart.js chuẩn Dark Theme
        Chart.defaults.color = '#888';
        Chart.defaults.font.family = "'Segoe UI', sans-serif";

        // Tạo hiệu ứng màu Gradient cho cột biểu đồ
        var gradientRed = ctx.createLinearGradient(0, 0, 0, 400);
        gradientRed.addColorStop(0, 'rgba(229, 9, 20, 1)');   // Đỏ rực ở trên đỉnh
        gradientRed.addColorStop(1, 'rgba(229, 9, 20, 0.2)'); // Mờ dần xuống đáy

        var revenueChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: movieLabels,
                datasets: [{
                    label: 'Doanh thu (VNĐ)',
                    data: revenueData,
                    backgroundColor: gradientRed, // Đổ màu Gradient xịn sò
                    borderColor: '#ff1e27', // Viền đỏ sáng
                    borderWidth: 2,
                    borderRadius: 6,
                    barPercentage: 0.4,
                    hoverBackgroundColor: '#ff3333', // Đỏ chói khi hover
                    hoverBorderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#1a1a1a', drawBorder: false }, // Lưới nền mờ
                        ticks: {
                            color: '#bbb',
                            font: { size: 13, weight: '500' },
                            callback: function(value) { return value.toLocaleString('vi-VN') + ' đ'; }
                        }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#bbb', font: { size: 13, weight: 'bold' } }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.9)',
                        titleColor: '#ffc107',
                        bodyColor: '#fff',
                        borderColor: '#e50914',
                        borderWidth: 1,
                        padding: 15,
                        displayColors: false,
                        titleFont: { size: 15 },
                        bodyFont: { size: 14, weight: 'bold' },
                        callbacks: {
                            label: function(context) { return '💰 ' + context.raw.toLocaleString('vi-VN') + ' VNĐ'; }
                        }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
