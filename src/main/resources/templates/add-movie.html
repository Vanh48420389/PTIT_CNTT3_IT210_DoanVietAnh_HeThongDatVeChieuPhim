<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style th:replace="~{admin-fragments :: admin-css}"></style>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body, .main-content { background-color: #050505 !important; color: #eaeaea; }
        .neon-card {
            background-color: #111 !important; border: 1px solid #222 !important;
            border-radius: 12px !important; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .dark-input { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: #fff !important; transition: all 0.3s; }
        .dark-input:focus { background-color: #222 !important; border-color: #e50914 !important; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4) !important; outline: none; }
        .form-label { color: #adb5bd; font-size: 0.9rem; letter-spacing: 0.5px; margin-bottom: 0.4rem; }

        /* Custom Nút Lưu */
        .btn-neon-save { background-color: #e50914; color: white; border: none; transition: 0.3s; box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); }
        .btn-neon-save:hover { background-color: #ff1e27; box-shadow: 0 0 20px rgba(229, 9, 20, 0.7); color: white; }

        /* BẢNG DARK MODE */
        .table { color: #eaeaea; border-color: #333 !important; }
        .table > :not(caption) > * > * { background-color: transparent !important; border-bottom-color: #333 !important; color: #eaeaea; }
        .table-dark th {
            background-color: #1a1a1a !important; color: #ffc107 !important;
            border-bottom: 2px solid #e50914 !important; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }
        .table-hover > tbody > tr:hover > td { background-color: rgba(229, 9, 20, 0.1) !important; color: #fff !important; }

        .btn-neon-edit { border: 1px solid #ffc107; color: #ffc107; background: transparent; transition: 0.3s; border-radius: 6px;}
        .btn-neon-edit:hover { background: #ffc107; color: #000; box-shadow: 0 0 15px rgba(255, 193, 7, 0.6); }
        .pagination-dark .page-link { background-color: #1a1a1a; border-color: #333; color: #adb5bd; }
        .pagination-dark .page-item.active .page-link { background-color: #e50914; border-color: #e50914; color: white; box-shadow: 0 0 10px rgba(229, 9, 20, 0.5); }
        .pagination-dark .page-link:hover { background-color: #333; color: white; }
        .pagination-dark .page-item.disabled .page-link { background-color: #0f0f0f; color: #555; border-color: #222; }
    </style>
</head>
<body>

<div th:replace="~{admin-fragments :: sidebar(activeMenu='movies')}"></div>

<div class="main-content">
    <div th:replace="~{admin-fragments :: topbar(pageTitle='🎞 QUẢN LÝ PHIM')}"></div>

    <div class="content-body p-4">

        <div class="d-flex justify-content-end mb-4">
            <button class="btn btn-warning fw-bold text-dark px-4 py-2" type="button" data-bs-toggle="collapse" data-bs-target="#formCollapse" aria-expanded="false" aria-controls="formCollapse" style="box-shadow: 0 0 10px rgba(255,193,7,0.5);">
                <i class="bi bi-plus-circle-fill me-2"></i> THÊM PHIM MỚI
            </button>
        </div>

        <div class="collapse mb-5" id="formCollapse">
            <div class="card neon-card">
                <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex align-items-center gap-2">
                    <i class="bi bi-film text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                    <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">NHẬP THÔNG TIN PHIM MỚI</h5>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/admin/movies/add}" th:object="${movie}" method="post">

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-pencil-square text-warning me-1"></i> Tên Phim (*)</label>
                                <input type="text" class="form-control dark-input" th:field="*{title}" placeholder="Nhập tên phim..." required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-tags text-warning me-1"></i> Thể Loại Phim (*)</label>
                                <select class="form-select dark-input" th:field="*{category.id}" required>
                                    <option value="">-- Chọn thể loại --</option>
                                    <option th:each="cat : ${categories}"
                                            th:value="${cat.id}"
                                            th:text="${cat.name}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-stopwatch text-warning me-1"></i> Thời Lượng (phút) (*)</label>
                                <input type="number" class="form-control dark-input" th:field="*{duration}" placeholder="Ví dụ: 120" required>
                            </div>
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-calendar-event text-warning me-1"></i> Ngày Phát Hành</label>
                                <input type="date" class="form-control dark-input" th:field="*{releaseDate}">
                            </div>
                            <div class="col-md-4 mb-4">
                                <label class="form-label fw-bold"><i class="bi bi-toggle-on text-warning me-1"></i> Trạng Thái</label>
                                <select class="form-select dark-input" th:field="*{status}">
                                    <option value="1">🟢 Đang Chiếu</option>
                                    <option value="0">🟡 Sắp Chiếu</option>
                                    <option value="-1">🔴 Ngừng Chiếu</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-image text-warning me-1"></i> Link Ảnh Poster (URL)</label>
                            <input type="text" class="form-control dark-input" th:field="*{posterUrl}" placeholder="https://domain.com/image.jpg">
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold"><i class="bi bi-card-text text-warning me-1"></i> Mô Tả Phim</label>
                            <textarea class="form-control dark-input" th:field="*{description}" rows="4" placeholder="Viết tóm tắt nội dung phim..."></textarea>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-neon-save fw-bold px-5 py-2">
                                <i class="bi bi-check-circle me-1"></i> LƯU PHIM
                            </button>
                            <button type="button" class="btn btn-outline-secondary fw-bold px-4 py-2" data-bs-toggle="collapse" data-bs-target="#formCollapse">Hủy & Đóng</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="card neon-card">
            <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex align-items-center gap-2">
                <i class="bi bi-list-task text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">DANH SÁCH PHIM TRONG HỆ THỐNG</h5>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Poster</th>
                            <th>Tên Phim</th>
                            <th>Thời Lượng</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="m, stat : ${moviePage.content}">
                            <td class="fw-bold text-secondary" th:text="${stat.count + (moviePage.number * moviePage.size)}">1</td>
                            <td>
                                <img th:src="${m.posterUrl}" alt="poster" style="width: 45px; height: 65px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.5);">
                            </td>
                            <td th:text="${m.title}" class="fw-bold text-info">Tên phim</td>
                            <td th:text="${m.duration + ' phút'}">120 phút</td>
                            <td>
                                <span th:if="${m.status == 1}" class="badge bg-success bg-opacity-25 border border-success text-success px-2 py-1">Đang Chiếu</span>
                                <span th:if="${m.status == 0}" class="badge bg-warning bg-opacity-25 border border-warning text-warning px-2 py-1">Sắp Chiếu</span>
                                <span th:if="${m.status == -1}" class="badge bg-danger bg-opacity-25 border border-danger text-danger px-2 py-1">Ngừng Chiếu</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/movies/edit/{id}(id=${m.id})}" class="btn btn-sm btn-neon-edit fw-bold px-2 me-1">
                                    <i class="bi bi-pencil"></i> Sửa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${moviePage.empty}">
                            <td colspan="6" class="text-center py-5 text-muted fw-bold">
                                <i class="bi bi-film fs-1 d-block mb-2"></i>
                                Chưa có bộ phim nào trong cơ sở dữ liệu.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-transparent border-top border-dark py-3" th:if="${moviePage.totalPages > 1}">
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-dark justify-content-center mb-0">
                        <li class="page-item" th:classappend="${moviePage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/movies/add(page=${moviePage.number - 1})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, moviePage.totalPages - 1)}"
                            th:classappend="${moviePage.number == i} ? 'active'">
                            <a class="page-link" th:href="@{/admin/movies/add(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${moviePage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/movies/add(page=${moviePage.number + 1})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>

    </div>
</div>

</body>
</html>
