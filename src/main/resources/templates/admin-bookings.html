<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản Lý Hóa Đơn - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style th:replace="~{admin-fragments :: admin-css}"></style>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body, .main-content {
            background-color: #050505 !important;
            color: #eaeaea;
        }

        .neon-card {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 12px !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* CUSTOM BẢNG (TABLE) DARK MODE */
        .table {
            color: #eaeaea;
            border-color: #333 !important;
        }
        .table > :not(caption) > * > * {
            background-color: transparent !important;
            border-bottom-color: #333 !important;
            color: #eaeaea;
        }
        .table-dark th {
            background-color: #1a1a1a !important;
            color: #ffc107 !important;
            border-bottom: 2px solid #e50914 !important;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Hiệu ứng hover từng dòng -> Sáng đỏ mờ */
        .table-hover > tbody > tr:hover > td {
            background-color: rgba(229, 9, 20, 0.1) !important;
            color: #fff !important;
        }

        /* Custom Nút Hủy Neon */
        .btn-neon-danger {
            background-color: transparent;
            color: #e50914;
            border: 1px solid #e50914;
            transition: 0.3s;
            border-radius: 6px;
        }
        .btn-neon-danger:hover {
            background-color: #e50914;
            color: white;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.7);
        }

        /* Custom Badge (Tem Trạng thái) */
        .badge-neon-success {
            border: 1px solid #198754;
            color: #20c997;
            background: rgba(25, 135, 84, 0.1);
            text-shadow: 0 0 5px rgba(32, 201, 151, 0.5);
        }
        .badge-neon-warning {
            border: 1px solid #ffc107;
            color: #ffc107;
            background: rgba(255, 193, 7, 0.1);
        }

        /* CSS CHO THANH PHÂN TRANG DARK MODE */
        .pagination-dark .page-link {
            background-color: #1a1a1a;
            border-color: #333;
            color: #adb5bd;
        }
        .pagination-dark .page-item.active .page-link {
            background-color: #e50914;
            border-color: #e50914;
            color: white;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }
        .pagination-dark .page-link:hover {
            background-color: #333;
            color: white;
        }
        .pagination-dark .page-item.disabled .page-link {
            background-color: #0f0f0f;
            color: #555;
            border-color: #222;
        }
    </style>
</head>
<body>

<div th:replace="~{admin-fragments :: sidebar(activeMenu='bookings')}"></div>

<div class="main-content">
    <div th:replace="~{admin-fragments :: topbar(pageTitle='🧾 QUẢN LÝ HÓA ĐƠN')}"></div>

    <div class="content-body p-4">

        <div th:if="${successMsg}" class="alert alert-success border-success border-2 bg-black text-success fw-bold text-center" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger border-danger border-2 bg-black text-danger fw-bold text-center" th:text="${errorMsg}"></div>

        <div class="card neon-card">
            <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex align-items-center gap-2">
                <i class="bi bi-receipt text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">DANH SÁCH VÉ ĐÃ ĐẶT</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th><i class="bi bi-person"></i> Khách Hàng</th>
                            <th><i class="bi bi-film"></i> Tên Phim</th>
                            <th><i class="bi bi-clock"></i> Suất Chiếu</th>
                            <th><i class="bi bi-geo-alt"></i> Phòng / Ghế</th>
                            <th><i class="bi bi-cash"></i> Tổng Tiền</th>
                            <th>Trạng Thái</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="b : ${bookingPage.content}" th:style="${b.status == 'CANCELLED'} ? 'opacity: 0.5; background-color: #0a0a0a;' : ''">
                            <td class="fw-bold text-secondary" th:text="'#' + ${b.id}"></td>
                            <td>
                                <div class="fw-bold text-white" th:text="${b.user.fullName}">Tên</div>
                                <small class="text-muted" th:text="${b.user.email}">Email</small>
                            </td>
                            <td class="fw-bold text-info" th:text="${b.showtime.movie.title}">Phim</td>
                            <td th:text="${#temporals.format(b.showtime.startTime, 'HH:mm - dd/MM/yyyy')}">Thời gian</td>
                            <td>
                                <span class="text-light" th:text="${b.showtime.room.name}"></span> <br>
                                <span class="badge badge-neon-warning mt-1 px-2 py-1 fs-6" th:text="${b.seat.name}"></span>
                            </td>
                            <td class="fw-bold" style="color: #20c997;" th:text="${#numbers.formatDecimal(b.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>

                            <td>
                                <span th:if="${b.status == 'PAID'}" class="badge badge-neon-success px-2 py-1">Đã Thanh Toán</span>
                                <span th:if="${b.status == 'CANCELLED'}" class="badge border border-secondary text-secondary bg-transparent px-2 py-1">Đã Hủy</span>
                            </td>

                            <td>
                                <form th:if="${b.status == 'PAID'}" th:id="'adminCancel-' + ${b.id}" th:action="@{/admin/bookings/cancel/{id}(id=${b.id})}" method="post">
                                    <button type="button" class="btn btn-sm btn-neon-danger fw-bold px-3" th:onclick="'confirmAdminCancel(' + ${b.id} + ')'">
                                        <i class="bi bi-x-circle me-1"></i> Hủy
                                    </button>
                                </form>
                                <i th:if="${b.status == 'CANCELLED'}" class="bi bi-lock-fill text-secondary fs-5"></i>
                            </td>
                        </tr>
                        <tr th:if="${bookingPage.empty}">
                            <td colspan="8" class="text-center py-5 text-muted fw-bold">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Chưa có dữ liệu vé trên hệ thống.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="card-footer bg-transparent border-top border-dark py-3" th:if="${bookingPage.totalPages > 1}">
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-dark justify-content-center mb-0">
                        <li class="page-item" th:classappend="${bookingPage.first} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/bookings(page=${bookingPage.number - 1})}">Trước</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, bookingPage.totalPages - 1)}"
                            th:classappend="${bookingPage.number == i} ? 'active'">
                            <a class="page-link" th:href="@{/admin/bookings(page=${i})}" th:text="${i + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${bookingPage.last} ? 'disabled'">
                            <a class="page-link" th:href="@{/admin/bookings(page=${bookingPage.number + 1})}">Sau</a>
                        </li>
                    </ul>
                </nav>
            </div>

        </div>
    </div>
</div>

<script>
    function confirmAdminCancel(bookingId) {
        Swal.fire({
            title: 'Hủy vé khách hàng?',
            text: "Hành động này sẽ giải phóng ghế ngay lập tức và không thể hoàn tác!",
            icon: 'warning',
            // ÉP DARK THEME CHO SWEET ALERT NÀY BRO:
            background: '#1a1a1a',
            color: '#fff',
            iconColor: '#ffc107',
            showCancelButton: true,
            confirmButtonColor: '#e50914',
            cancelButtonColor: '#444',
            confirmButtonText: '<i class="bi bi-check-lg"></i> Xác nhận Hủy',
            cancelButtonText: 'Bỏ qua',
            customClass: {
                popup: 'border border-secondary rounded-4'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('adminCancel-' + bookingId).submit();
            }
        })
    }
</script>

</body>
</html>
