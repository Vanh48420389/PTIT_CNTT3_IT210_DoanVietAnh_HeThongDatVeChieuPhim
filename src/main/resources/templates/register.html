<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Tài Khoản - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap');

        body {
            background: linear-gradient(rgba(5, 5, 5, 0.85), rgba(10, 10, 10, 0.95)),
                        url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 20px rgba(229, 9, 20, 0.1);
            width: 450px;
            overflow-y: auto;
            max-height: 90vh;
        }

        .card-header {
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid #e50914;
            padding: 20px 0;
        }

        .form-control {
            background: rgba(0, 0, 0, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff !important;
            border-radius: 4px;
            padding: 10px 15px;
            transition: all 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 12px rgba(229, 9, 20, 0.4) !important;
            border-color: #e50914 !important;
            outline: none;
        }

        .btn-cinema {
            background: #e50914;
            border: none;
            color: white;
            border-radius: 4px;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .btn-cinema:hover {
            background: #ff1e27;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(229, 9, 20, 0.6);
            color: white;
        }

        .text-danger-glow {
            color: #ff4d4d;
            font-size: 0.75rem;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(255, 77, 77, 0.3);
        }

        .glow-text-gold {
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="card-header text-center">
        <h4 class="mb-0 fw-bold text-uppercase d-flex justify-content-center align-items-center gap-2" style="letter-spacing: 2px;">
            <i class="bi bi-person-plus-fill text-warning glow-text-gold"></i>
            ĐĂNG KÝ THÀNH VIÊN
        </h4>
    </div>
    <div class="card-body p-4">

        <form th:action="@{/register}" th:object="${user}" method="post">

            <div th:if="${error}" class="alert alert-danger text-center fw-bold rounded-1 py-2"
                 style="background: rgba(229, 9, 20, 0.1); border-color: #e50914; color: #ff4d4d; font-size: 0.85rem;" th:text="${error}"></div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-light opacity-75">
                    <i class="bi bi-person-vcard text-warning me-1"></i> HỌ VÀ TÊN
                </label>
                <input type="text" class="form-control" th:field="*{fullName}" th:errorclass="border-danger" placeholder="Ví dụ: Nguyễn Văn A">
                <div th:if="${#fields.hasErrors('fullName')}"
                     th:text="${#fields.errors('fullName')[0]}"
                     class="text-danger-glow mt-1"></div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-light opacity-75">
                    <i class="bi bi-envelope-at-fill text-warning me-1"></i> EMAIL ĐĂNG NHẬP
                </label>
                <input type="text" class="form-control" th:field="*{email}" th:errorclass="border-danger" placeholder="example@gmail.com">
                <div th:if="${#fields.hasErrors('email')}" class="text-danger-glow mt-1">
                    <span th:each="err : ${#fields.errors('email')}"
                          th:if="${err.contains('trống')}" th:text="${err}"></span>
                    <span th:if="${!#strings.contains(#fields.errors('email'), 'trống')}"
                          th:text="${#fields.errors('email')[0]}"></span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small text-light opacity-75">
                    <i class="bi bi-telephone-fill text-warning me-1"></i> SỐ ĐIỆN THOẠI
                </label>
                <input type="text" class="form-control" th:field="*{phone}" th:errorclass="border-danger" placeholder="09xxxxxxxx">
                <div th:if="${#fields.hasErrors('phone')}" class="text-danger-glow mt-1">
                    <span th:each="err : ${#fields.errors('phone')}"
                          th:if="${err.contains('trống')}" th:text="${err}"></span>
                    <span th:if="${!#strings.contains(#fields.errors('phone'), 'trống')}"
                          th:text="${#fields.errors('phone')[0]}"></span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold small text-light opacity-75">
                    <i class="bi bi-key-fill text-warning me-1"></i> MẬT KHẨU
                </label>
                <input type="password" class="form-control" th:field="*{password}" th:errorclass="border-danger" placeholder="Tối thiểu 6 ký tự">
                <div th:if="${#fields.hasErrors('password')}"
                     th:text="${#fields.errors('password')[0]}"
                     class="text-danger-glow mt-1"></div>
            </div>

            <button type="submit" class="btn btn-cinema btn-lg w-100 fw-bold text-uppercase fs-6 py-3 mt-2">
                <i class="bi bi-lightning-charge-fill me-1"></i> TẠO TÀI KHOẢN NGAY
            </button>

            <div class="text-center mt-4 pt-3 border-top border-secondary border-opacity-50 small">
                <span class="text-light opacity-75">Đã là thành viên?</span>
                <a href="/login" class="text-warning fw-bold text-decoration-none ms-1" style="letter-spacing: 0.5px;">ĐĂNG NHẬP</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
