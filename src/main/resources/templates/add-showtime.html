<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Xếp Lịch Chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <style th:replace="~{admin-fragments :: admin-css}"></style>

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body, .main-content { background-color: #050505 !important; color: #eaeaea; }

        .neon-card {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 12px !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
        }

        .dark-input {
            background-color: #1a1a1a !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            transition: all 0.3s;
            color-scheme: dark;
        }

        .dark-input:focus {
            background-color: #222 !important;
            border-color: #e50914 !important;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4) !important;
            outline: none;
        }

        .form-label { color: #adb5bd; font-size: 0.95rem; letter-spacing: 0.5px; margin-bottom: 0.5rem; }

        .btn-neon-save {
            background-color: #e50914; color: white; border: none; transition: 0.3s;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4); letter-spacing: 1px;
        }
        .btn-neon-save:hover { background-color: #ff1e27; box-shadow: 0 0 20px rgba(229, 9, 20, 0.7); color: white; }

        /* BẢNG DARK MODE */
        .table { color: #eaeaea; border-color: #333 !important; }
        .table > :not(caption) > * > * { background-color: transparent !important; border-bottom-color: #333 !important; color: #eaeaea; }
        .table-dark th {
            background-color: #1a1a1a !important; color: #ffc107 !important;
            border-bottom: 2px solid #e50914 !important; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }
        .table-hover > tbody > tr:hover > td { background-color: rgba(229, 9, 20, 0.1) !important; color: #fff !important; }

        /* Nút thao tác */
        .btn-neon-edit { border: 1px solid #ffc107; color: #ffc107; background: transparent; transition: 0.3s; }
        .btn-neon-edit:hover { background: #ffc107; color: #000; box-shadow: 0 0 15px rgba(255, 193, 7, 0.6); }
        .btn-neon-delete { border: 1px solid #e50914; color: #e50914; background: transparent; transition: 0.3s; }
        .btn-neon-delete:hover { background: #e50914; color: #fff; box-shadow: 0 0 15px rgba(229, 9, 20, 0.6); }
    </style>
</head>
<body>

<div th:replace="~{admin-fragments :: sidebar(activeMenu='showtimes')}"></div>

<div class="main-content">
    <div th:replace="~{admin-fragments :: topbar(pageTitle='📅 QUẢN LÝ SUẤT CHIẾU')}"></div>

    <div class="content-body p-4">

        <div class="card neon-card col-md-10 mx-auto">
            <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex align-items-center gap-2">
                <i class="bi bi-calendar-plus text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">TẠO SUẤT CHIẾU MỚI</h5>
            </div>

            <div class="card-body p-4">

                <div th:if="${errorMsg}" class="alert alert-danger border-danger border-2 text-danger fw-bold bg-black" th:text="${errorMsg}"></div>
                <div th:if="${successMsg}" class="alert alert-success border-success border-2 text-success fw-bold bg-black" th:text="${successMsg}"></div>

                <form th:action="@{/admin/showtimes/add}" method="post">
                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-film text-warning me-1"></i> Chọn Phim (*)</label>
                            <select name="movieId" class="form-select dark-input" required>
                                <option value="">-- Click để chọn phim --</option>
                                <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title} + ' (⏳ ' + ${m.duration} + ' p)'"></option>
                            </select>
                        </div>

                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-door-open text-warning me-1"></i> Chọn Phòng Chiếu (*)</label>
                            <select name="roomId" class="form-select dark-input" required>
                                <option value="">-- Click để chọn phòng --</option>
                                <option th:each="r : ${rooms}" th:value="${r.id}" th:text="'🍿 ' + ${r.name}"></option>
                            </select>
                        </div>

                        <div class="col-md-4 mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-clock-history text-warning me-1"></i> Giờ Chiếu (*)</label>
                            <input type="datetime-local" name="startTime" class="form-control dark-input py-2" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-neon-save fw-bold w-100 py-2 fs-5 mt-2">
                        <i class="bi bi-plus-circle me-1"></i> THÊM SUẤT CHIẾU
                    </button>
                </form>
            </div>
        </div>

        <div class="card neon-card col-md-10 mx-auto mt-5">
            <div class="card-header bg-transparent border-bottom border-dark py-3 d-flex align-items-center gap-2">
                <i class="bi bi-list-ul text-warning fs-4" style="text-shadow: 0 0 10px rgba(255,193,7,0.5);"></i>
                <h5 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">DANH SÁCH SUẤT CHIẾU</h5>
            </div>

            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th><i class="bi bi-film"></i> Tên Phim</th>
                            <th><i class="bi bi-door-open"></i> Phòng</th>
                            <th><i class="bi bi-clock"></i> Giờ Bắt Đầu</th>
                            <th>Thao Tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="st : ${allShowtimes}">
                            <td class="fw-bold text-secondary" th:text="'#' + ${st.id}"></td>
                            <td class="fw-bold text-info" th:text="${st.movie.title}">Tên phim</td>
                            <td class="text-white" th:text="${st.room.name}">Tên phòng</td>
                            <td class="text-warning fw-bold" th:text="${#temporals.format(st.startTime, 'HH:mm - dd/MM/yyyy')}">Thời gian</td>
                            <td>
                                <a th:href="@{/admin/showtimes/edit/{id}(id=${st.id})}" class="btn btn-sm btn-neon-edit fw-bold px-3 me-2">
                                    <i class="bi bi-pencil-square"></i> Sửa
                                </a>
                                <a href="#" th:onclick="'confirmDelete(event, \'/admin/showtimes/delete/' + ${st.id} + '\')'" class="btn btn-sm btn-neon-delete fw-bold px-3">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(allShowtimes)}">
                            <td colspan="5" class="text-center py-4 text-muted fw-bold">Chưa có suất chiếu nào được tạo.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // Hàm cảnh báo Xóa Suất Chiếu
    function confirmDelete(event, deleteUrl) {
        event.preventDefault();
        Swal.fire({
            title: 'Xóa suất chiếu này?',
            text: "Cảnh báo: Nếu suất chiếu đã có khách mua vé, việc xóa có thể gây lỗi hệ thống! Bạn có chắc chắn?",
            icon: 'warning',
            background: '#1a1a1a',
            color: '#fff',
            iconColor: '#e50914',
            showCancelButton: true,
            confirmButtonColor: '#e50914',
            cancelButtonColor: '#444',
            confirmButtonText: '<i class="bi bi-trash-fill"></i> Xác nhận Xóa',
            cancelButtonText: 'Bỏ qua',
            customClass: { popup: 'border border-secondary rounded-4' }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = deleteUrl;
            }
        });
    }
</script>

</body>
</html>
