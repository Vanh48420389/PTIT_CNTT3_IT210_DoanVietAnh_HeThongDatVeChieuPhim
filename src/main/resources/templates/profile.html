<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Cá Nhân - Smart Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* ĐỒNG BỘ DARK CINEMATIC */
        body {
            background-color: #050505;
            color: #eaeaea;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Dark Mode */
        .navbar-dark {
            background-color: #0a0a0a !important;
            border-bottom: 2px solid #e50914;
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.2);
        }

        /* Thẻ Card Neon */
        .neon-card {
            background-color: #111 !important;
            border: 1px solid #222 !important;
            border-radius: 12px !important;
            box-shadow: 0 5px 25px rgba(0,0,0,0.8);
            transition: 0.3s;
            overflow: hidden;
        }
        .neon-card:hover {
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        /* Input Dark Mode */
        .dark-input {
            background-color: #1a1a1a !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            transition: all 0.3s;
            border-radius: 6px;
        }
        .dark-input:focus {
            background-color: #222 !important;
            border-color: #e50914 !important;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4) !important;
            outline: none;
        }

        /* Hiệu ứng cho ô không được phép sửa (Readonly/Disabled) */
        .dark-input:disabled, .dark-input[readonly] {
            background-color: #0a0a0a !important;
            border-color: #222 !important;
            color: #888 !important;
            cursor: not-allowed;
        }

        /* Form Label */
        .form-label {
            color: #adb5bd;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        /* Nút Save Neon */
        .btn-neon-save {
            background-color: #e50914;
            color: white;
            border: none;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.4);
            letter-spacing: 1px;
            border-radius: 6px;
        }
        .btn-neon-save:hover {
            background-color: #ff1e27;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.7);
            color: white;
            transform: translateY(-2px);
        }

        .glow-text-gold {
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-5 py-3">
    <div class="container">
        <a class="navbar-brand text-warning fw-bold d-flex align-items-center gap-2 glow-text-gold" href="/">
            <i class="bi bi-film"></i> SMART CINEMA
        </a>
        <div class="d-flex gap-2">
            <a th:if="${session.loggedInUser.role == 'ROLE_ADMIN'}" href="/admin/dashboard" class="btn btn-outline-warning btn-sm fw-bold px-3">
                <i class="bi bi-speedometer2 me-1"></i> Về Dashboard
            </a>
            <a th:if="${session.loggedInUser.role == 'ROLE_USER'}" href="/" class="btn btn-outline-light btn-sm fw-bold px-3">
                <i class="bi bi-house-door me-1"></i> Về Trang Chủ
            </a>
            <a href="/logout" class="btn btn-danger btn-sm fw-bold px-3 border border-danger">
                <i class="bi bi-box-arrow-right me-1"></i> Đăng Xuất
            </a>
        </div>
    </div>
</nav>

<div class="container flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card neon-card">

                <div class="card-header bg-transparent border-bottom border-dark py-4 text-center">
                    <i class="bi bi-person-circle text-warning mb-2 d-block glow-text-gold" style="font-size: 3rem;"></i>
                    <h4 class="mb-0 text-white fw-bold" style="letter-spacing: 1px;">THÔNG TIN CÁ NHÂN</h4>
                </div>

                <div class="card-body p-4 p-md-5">

                    <div th:if="${param.success}" class="alert alert-success border-success border-2 bg-black text-success fw-bold text-center rounded-2 mb-4">
                        <i class="bi bi-check-circle-fill me-1"></i> Cập nhật thông tin thành công!
                    </div>

                    <form th:action="@{/profile}" th:object="${user}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-shield-lock-fill text-warning me-1"></i> Quyền hạn</label>
                            <input type="text" class="form-control dark-input text-danger fw-bold"
                                   th:value="*{role == 'ROLE_ADMIN' ? '👑 Quản Trị Viên (Admin)' : '👤 Thành Viên'}" disabled>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-envelope-fill text-warning me-1"></i> Email đăng nhập</label>
                            <input type="email" class="form-control dark-input" th:field="*{email}" readonly>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold"><i class="bi bi-person-vcard text-warning me-1"></i> Họ và Tên</label>
                            <input type="text" class="form-control dark-input py-2" th:field="*{fullName}" required>
                        </div>

                        <div class="mb-5">
                            <label class="form-label fw-bold"><i class="bi bi-telephone-fill text-warning me-1"></i> Số điện thoại</label>
                            <input type="text" class="form-control dark-input py-2" th:field="*{phone}" required>
                        </div>

                        <button type="submit" class="btn btn-neon-save w-100 fw-bold fs-5 py-2">
                            <i class="bi bi-floppy-fill me-1"></i> LƯU THAY ĐỔI
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
